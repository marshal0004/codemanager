<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snippets Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-primary: #0a0a0f;
        --bg-secondary: #1a1a2e;
        --bg-tertiary: #16213e;
        --accent-primary: #00d4ff;
        --accent-secondary: #7c3aed;
        --accent-gradient: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%);
        --text-primary: #ffffff;
        --text-secondary: #94a3b8;
        --text-muted: #64748b;
        --border-color: rgba(255, 255, 255, 0.1);
        --glass-bg: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
      }

      body {
        background: var(--bg-primary);
        color: var(--text-primary);
        font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        overflow-x: hidden;
        position: relative;
      }

      /* Animated background */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
            circle at 20% 80%,
            rgba(0, 212, 255, 0.15) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 80% 20%,
            rgba(124, 58, 237, 0.15) 0%,
            transparent 50%
          );
        animation: bgMove 20s ease-in-out infinite;
        z-index: -1;
      }

      @keyframes bgMove {
        0%,
        100% {
          transform: translateX(0) translateY(0);
        }
        25% {
          transform: translateX(10px) translateY(-10px);
        }
        50% {
          transform: translateX(-5px) translateY(10px);
        }
        75% {
          transform: translateX(-10px) translateY(-5px);
        }
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 2rem;
        min-height: 100vh;
      }

      /* ===== DARK THEME DROPDOWN FIXES ===== */

      /* Target all select elements in the application */
      select.form-input,
      select.editor-language-select,
      #snippetCollection,
      #advancedSnippetCollection {
        background: var(--bg-secondary) !important;
        color: var(--text-primary) !important;
        border: 1px solid var(--glass-border) !important;
        border-radius: 12px !important;
        padding: 1rem !important;
        font-size: 1rem !important;
        transition: all 0.3s ease !important;
        backdrop-filter: blur(20px) !important;
      }

      /* Focus states */
      select.form-input:focus,
      select.editor-language-select:focus,
      #snippetCollection:focus,
      #advancedSnippetCollection:focus {
        outline: none !important;
        border-color: var(--accent-primary) !important;
        box-shadow: 0 0 20px rgba(0, 212, 255, 0.3) !important;
        background: var(--bg-secondary) !important;
      }

      /* Option styling */
      select.form-input option,
      select.editor-language-select option,
      #snippetCollection option,
      #advancedSnippetCollection option {
        background: var(--bg-secondary) !important;
        color: var(--text-primary) !important;
        padding: 0.75rem !important;
        border: none !important;
      }

      /* Webkit browsers (Chrome, Safari) specific fixes */
      select.form-input,
      select.editor-language-select {
        -webkit-appearance: none !important;
        -moz-appearance: none !important;
        appearance: none !important;
        background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ffffff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6,9 12,15 18,9'%3e%3c/polyline%3e%3c/svg%3e") !important;
        background-repeat: no-repeat !important;
        background-position: right 1rem center !important;
        background-size: 1rem !important;
        padding-right: 3rem !important;
      }

      /* Firefox specific fixes */
      @-moz-document url-prefix() {
        select.form-input,
        select.editor-language-select,
        #snippetCollection,
        #advancedSnippetCollection {
          background: var(--bg-secondary) !important;
          color: var(--text-primary) !important;
        }
      }

      /* Header */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 3rem;
        backdrop-filter: blur(20px);
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        padding: 1.5rem 2rem;
        position: relative;
        overflow: hidden;
      }

      .header::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.1),
          transparent
        );
        animation: shimmer 3s infinite;
      }

      @keyframes shimmer {
        0% {
          left: -100%;
        }
        100% {
          left: 100%;
        }
      }

      .header-title {
        font-size: 2.5rem;
        font-weight: 800;
        background: var(--accent-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .header-actions {
        display: flex;
        gap: 1rem;
        align-items: center;
      }

      /* Floating Action Button - Centered Bottom Position */
      .fab-container {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        z-index: 1000;
        pointer-events: none; /* Allow clicks to pass through container */
      }

      .fab {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        background: var(--accent-gradient);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        color: white;
        box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        pointer-events: auto; /* Re-enable clicks on buttons */
        position: relative;
      }

      .fab-advanced {
        /* Remove conflicting positioning - let flexbox handle it */
        background: linear-gradient(
          135deg,
          #7c3aed 0%,
          #00d4ff 100%
        ) !important;
        box-shadow: 0 10px 30px rgba(124, 58, 237, 0.3);
      }

      .fab:hover {
        transform: scale(1.1) rotate(90deg);
        box-shadow: 0 15px 40px rgba(0, 212, 255, 0.5);
      }

      .fab-advanced:hover {
        box-shadow: 0 15px 40px rgba(124, 58, 237, 0.5);
      }

      /* Enhanced logging and debugging styles */
      .fab-container::before {
        content: "";
        position: absolute;
        top: -10px;
        left: -10px;
        right: -10px;
        bottom: -10px;
        border: 2px dashed rgba(0, 212, 255, 0.2);
        border-radius: 20px;
        opacity: 0;
        transition: opacity 0.3s ease;
        pointer-events: none;
      }

      /* Debug mode - uncomment to see container boundaries */
      /*
.fab-container:hover::before {
  opacity: 1;
}
*/

      /* Responsive adjustments */
      @media (max-width: 768px) {
        .fab-container {
          bottom: 1.5rem;
          gap: 0.8rem;
        }

        .fab {
          width: 60px;
          height: 60px;
          font-size: 1.3rem;
        }
      }

      @media (max-width: 480px) {
        .fab-container {
          bottom: 1rem;
          gap: 0.6rem;
        }

        .fab {
          width: 55px;
          height: 55px;
          font-size: 1.2rem;
        }
      }

      /* Search and Filter Bar */
      .search-bar {
        display: flex;
        gap: 1rem;
        margin-bottom: 2rem;
        flex-wrap: wrap;
      }

      .search-input {
        flex: 1;
        min-width: 300px;
        padding: 1rem 1.5rem;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 15px;
        color: var(--text-primary);
        font-size: 1rem;
        backdrop-filter: blur(20px);
        transition: all 0.3s ease;
      }

      .search-input:focus {
        outline: none;
        border-color: var(--accent-primary);
        box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
      }

      .filter-chip {
        padding: 0.75rem 1.5rem;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        color: var(--text-secondary);
        cursor: pointer;
        transition: all 0.3s ease;
        backdrop-filter: blur(20px);
        white-space: nowrap;
      }

      .filter-chip:hover,
      .filter-chip.active {
        background: var(--accent-gradient);
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
      }

      /* Snippet Grid */
      .snippets-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
        gap: 1.5rem;
        margin-bottom: 2rem;
      }

      .snippet-card {
        height: 480px; /* Fixed height for all cards */
        display: flex;
        flex-direction: column;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        padding: 1.5rem;
        backdrop-filter: blur(20px);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
        cursor: pointer;
      }

      .snippet-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: var(--accent-gradient);
        transform: scaleX(0);
        transition: transform 0.3s ease;
      }

      .snippet-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 20px 40px rgba(0, 212, 255, 0.2);
        border-color: var(--accent-primary);
      }

      .snippet-card:hover::before {
        transform: scaleX(1);
      }

      .snippet-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 1rem;
      }

      .snippet-title {
        font-size: 1.25rem;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 0.5rem;
      }

      .snippet-meta {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-bottom: 1rem;
      }

      .meta-chip {
        padding: 0.25rem 0.75rem;
        background: rgba(124, 58, 237, 0.2);
        border: 1px solid rgba(124, 58, 237, 0.3);
        border-radius: 8px;
        font-size: 0.75rem;
        color: #a855f7;
      }

      .snippet-code {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 12px;
        padding: 1rem;
        margin: 1rem 0;
        height: 150px; /* Fixed height for code container */
        max-height: 150px; /* Ensure it doesn't exceed */
        overflow-y: auto; /* Vertical scrollbar */
        overflow-x: auto; /* Horizontal scrollbar */
        flex-shrink: 0; /* Prevent shrinking */
        font-family: "Fira Code", "Consolas", monospace;
        font-size: 0.9rem;
        line-height: 1.5;
        position: relative;
      }

      .snippet-actions {
        margin-top: auto; /* Push actions to bottom */
        flex-shrink: 0; /* Prevent shrinking */
        display: flex;
        gap: 0.5rem;
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .snippet-card:hover .snippet-actions {
        opacity: 1;
      }
      .snippet-code pre {
        margin: 0;
        white-space: pre; /* Preserve formatting */
        word-wrap: normal; /* Don't break words */
        min-width: max-content; /* Allow horizontal scroll */
      }
      .action-btn {
        padding: 0.5rem;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 8px;
        color: var(--text-secondary);
        cursor: pointer;
        transition: all 0.3s ease;
      }
      /* Custom scrollbar for code blocks */
      .snippet-code::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      .snippet-code::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
      }

      .snippet-code::-webkit-scrollbar-thumb {
        background: var(--accent-primary);
        border-radius: 4px;
      }

      .snippet-code::-webkit-scrollbar-thumb:hover {
        background: var(--accent-secondary);
      }

      .action-btn:hover {
        background: var(--accent-primary);
        color: white;
        transform: scale(1.1);
      }

      /* Modal Styles */
      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(10px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 2000;
        animation: fadeIn 0.3s ease;
      }

      .modal.active {
        display: flex;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .modal-content {
        background: var(--bg-secondary);
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        padding: 2rem;
        max-width: 800px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
        position: relative;
        animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      @keyframes slideUp {
        from {
          transform: translateY(30px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
      }

      .close-btn {
        background: none;
        border: none;
        color: var(--text-secondary);
        font-size: 1.5rem;
        cursor: pointer;
        transition: color 0.3s ease;
      }

      .close-btn:hover {
        color: var(--text-primary);
      }

      /* Form Styles */
      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: var(--text-primary);
      }

      .form-input,
      .form-textarea {
        width: 100%;
        padding: 1rem;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        color: var(--text-primary);
        font-size: 1rem;
        transition: all 0.3s ease;
      }

      .form-textarea {
        min-height: 200px;
        font-family: "Fira Code", "Consolas", monospace;
        resize: vertical;
      }

      .form-input:focus,
      .form-textarea:focus {
        outline: none;
        border-color: var(--accent-primary);
        box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
      }

      .btn-primary {
        background: var(--accent-gradient);
        border: none;
        padding: 1rem 2rem;
        border-radius: 12px;
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
      }

      /* Responsive */
      @media (max-width: 768px) {
        .container {
          padding: 1rem;
        }

        .header {
          flex-direction: column;
          gap: 1rem;
          text-align: center;
        }

        .snippets-grid {
          grid-template-columns: 1fr;
        }

        .search-bar {
          flex-direction: column;
        }

        .search-input {
          min-width: auto;
        }
      }

      /* Loading States */
      .loading {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 2px solid var(--glass-border);
        border-radius: 50%;
        border-top-color: var(--accent-primary);
        animation: spin 1s ease-in-out infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Advanced Editor Styles */
      .advanced-editor-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        backdrop-filter: blur(10px);
        z-index: 3000;
        display: none;
      }

      .advanced-editor-overlay.active {
        display: flex;
        flex-direction: column;
      }

      .snippet-editor-wrapper {
        width: 100%;
        height: 100%;
        background: var(--bg-primary);
        color: var(--text-primary);
        font-family: "Inter", sans-serif;
        display: flex;
        flex-direction: column;
      }

      .editor-header {
        background: var(--glass-bg);
        border-bottom: 1px solid var(--glass-border);
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
      }

      .editor-tabs {
        display: flex;
        gap: 1rem;
      }

      .editor-tab {
        padding: 0.5rem 1rem;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s ease;
        color: var(--text-secondary);
      }

      .editor-tab.active {
        background: var(--accent-gradient);
        color: white;
      }

      .editor-controls {
        display: flex;
        gap: 1rem;
        align-items: center;
      }

      .editor-close-btn {
        background: none;
        border: none;
        color: var(--text-secondary);
        font-size: 1.5rem;
        cursor: pointer;
        padding: 0.5rem;
        border-radius: 8px;
        transition: all 0.3s ease;
      }

      .editor-close-btn:hover {
        background: var(--glass-bg);
        color: var(--text-primary);
      }

      .editor-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 2rem;
        gap: 1rem;
      }

      .editor-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
      }

      .editor-snippet-title {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        padding: 0.75rem 1rem;
        color: var(--text-primary);
        font-size: 1.25rem;
        font-weight: 600;
        width: 300px;
      }

      .editor-language-select {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 8px;
        padding: 0.5rem 1rem;
        color: var(--text-primary);
        cursor: pointer;
      }

      .editor-actions {
        display: flex;
        gap: 1rem;
      }

      .editor-btn {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 8px;
        padding: 0.5rem 1rem;
        color: var(--text-primary);
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .editor-btn:hover {
        background: var(--accent-primary);
        color: white;
      }

      .editor-btn.primary {
        background: var(--accent-gradient);
        color: white;
      }

      .code-editor-container {
        flex: 1;
        display: flex;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        overflow: hidden;
      }

      .advanced-code-editor {
        flex: 1;
        background: transparent;
        border: none;
        color: var(--text-primary);
        font-family: "Fira Code", monospace;
        font-size: 14px;
        line-height: 1.5;
        padding: 1rem;
        resize: none;
        outline: none;
      }

      .editor-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem 0;
        border-top: 1px solid var(--glass-border);
        margin-top: 1rem;
      }

      .editor-status {
        color: var(--text-secondary);
        font-size: 0.9rem;
      }

      /* add to collection css  */
      /* Collection Management Styles */
      .collection-btn {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        color: white;
        border: none;
        padding: 0.5rem;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 0.9rem;
      }
      /* Enhanced Collection Button Styles */
      .collection-btn {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        color: white;
        transition: all 0.3s ease;
      }

      .collection-btn:hover {
        transform: scale(1.1);
        box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
      }

      .collection-btn.remove {
        background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      }

      .collection-btn.remove:hover {
        box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4);
      }

      /* Collection chip in snippet meta */
      .meta-chip[style*="rgba(16, 185, 129"] {
        animation: fadeIn 0.3s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.8);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .collection-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
      }

      .collection-btn.remove {
        background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      }

      .collection-btn.remove:hover {
        box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4);
      }

      .collection-dropdown {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: var(--bg-secondary);
        border: 1px solid var(--glass-border);
        border-radius: 8px;
        max-height: 200px;
        overflow-y: auto;
        z-index: 1000;
        display: none;
      }

      .collection-dropdown.active {
        display: block;
      }

      .collection-option {
        padding: 0.75rem 1rem;
        cursor: pointer;
        transition: background 0.2s ease;
        border-bottom: 1px solid var(--glass-border);
      }

      .collection-option:hover {
        background: var(--glass-bg);
      }

      .collection-option:last-child {
        border-bottom: none;
      }

      @keyframes slideIn {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      @keyframes fadeOut {
        from {
          opacity: 1;
          transform: scale(1);
        }
        to {
          opacity: 0;
          transform: scale(0.8);
        }

    <script>
      // Dynamic Card Height Adjustment Based on Tags
      function adjustCardHeightsForTags() {
        console.log(
          "🏷️ TAG HEIGHT ADJUSTER - Starting dynamic height adjustment"
        );

        const cards = document.querySelectorAll(".snippet-card");
        let adjustmentsMade = 0;

        cards.forEach((card, index) => {
          try {
            // Find tags container (different selectors for different pages)
            const tagsContainer = card.querySelector(
              ".snippet-meta, .tags, .snippet-tags"
            );
            const actionButtons = card.querySelector(
              ".snippet-actions, .card-actions, .action-buttons"
            );

            if (!tagsContainer) {
              console.log(`⚠️ Card ${index + 1}: No tags container found`);
              return;
            }

            // Count tags (handle different tag structures)
            let tagCount = 0;
            const metaChips = tagsContainer.querySelectorAll(".meta-chip");
            const tagSpans = tagsContainer.querySelectorAll(".tag");

            if (metaChips.length > 0) {
              // Count meta-chips but exclude language chip (usually first one)
              tagCount = Math.max(0, metaChips.length - 1);
            } else if (tagSpans.length > 0) {
              tagCount = tagSpans.length;
            }

            console.log(`🏷️ Card ${index + 1}: Found ${tagCount} tags`);

            // Calculate new height based on tag count
            let newHeight = 420; // Base height
            let needsScroll = false;

            if (tagCount <= 5) {
              // No adjustment needed
              newHeight = 420;
            } else if (tagCount <= 9) {
              // Slight increase
              newHeight = 460;
              console.log(
                `📏 Card ${index + 1}: Slight height increase to ${newHeight}px`
              );
            } else if (tagCount <= 15) {
              // Slight increase
              newHeight = 480;
              console.log(
                `📏 Card ${index + 1}: Slight height increase to ${newHeight}px`
              );
            } else {
              // Many tags - add scrollbar to card
              newHeight = 420;
              needsScroll = true;
              console.log(
                `📜 Card ${index + 1}: Adding scrollbar for ${tagCount} tags`
              );
            }

            // Apply height adjustment
            card.style.height = `${newHeight}px`;

            // Add scrollbar if needed
            if (needsScroll) {
              card.style.overflowY = "auto";
              card.style.paddingRight = "8px"; // Account for scrollbar

              // Add custom scrollbar styles
              card.style.scrollbarWidth = "thin";
              card.classList.add("card-with-scrollbar");
            } else {
              card.style.overflowY = "visible";
              card.style.paddingRight = "1.5rem"; // Reset to original
              card.classList.remove("card-with-scrollbar");
            }

            // Ensure action buttons are always visible
            if (actionButtons) {
              actionButtons.style.position = "sticky";
              actionButtons.style.bottom = "0";
              actionButtons.style.backgroundColor = "inherit";
              actionButtons.style.zIndex = "10";
            }

            adjustmentsMade++;
          } catch (error) {
            console.error(`❌ Error adjusting card ${index + 1}:`, error);
          }
        });

        console.log(
          `✅ TAG HEIGHT ADJUSTER - Completed ${adjustmentsMade} adjustments`
        );

        // Add scrollbar styles if not already present
        addScrollbarStyles();
      }

      // Add custom scrollbar styles for cards
      function addScrollbarStyles() {
        const existingStyle = document.getElementById("cardScrollbarStyles");
        if (existingStyle) return; // Already added

        const style = document.createElement("style");
        style.id = "cardScrollbarStyles";
        style.textContent = `
        /* Enhanced Custom scrollbar for snippet cards */
      .snippet-card::-webkit-scrollbar,
      .card-with-scrollbar::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      .snippet-card::-webkit-scrollbar-track,
      .card-with-scrollbar::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
      }

      .snippet-card::-webkit-scrollbar-thumb,
      .card-with-scrollbar::-webkit-scrollbar-thumb {
        background: var(--accent-primary);
        border-radius: 4px;
        transition: background 0.3s ease;
      }

      .snippet-card::-webkit-scrollbar-thumb:hover,
      .card-with-scrollbar::-webkit-scrollbar-thumb:hover {
        background: var(--accent-secondary);
      }

      /* Enhanced Firefox support */
      .snippet-card,
      .card-with-scrollbar {
        scrollbar-width: thin;
        scrollbar-color: var(--accent-primary) rgba(255, 255, 255, 0.1);
      }
        `;

        document.head.appendChild(style);
        console.log("🎨 Added custom scrollbar styles for cards");
      }

      // Enhanced logging for tag detection
      function logTagAnalysis() {
        console.log("🔍 TAG ANALYSIS - Analyzing tag distribution");

        const cards = document.querySelectorAll(".snippet-card");
        const tagStats = {
          noTags: 0,
          fewTags: 0, // 1-5 tags
          mediumTags: 0, // 6-9 tags
          manyTags: 0, // 10+ tags
        };

        cards.forEach((card, index) => {
          const tagsContainer = card.querySelector(
            ".snippet-meta, .tags, .snippet-tags"
          );
          if (!tagsContainer) {
            tagStats.noTags++;
            return;
          }

          const metaChips = tagsContainer.querySelectorAll(".meta-chip");
          const tagSpans = tagsContainer.querySelectorAll(".tag");

          let tagCount = 0;
          if (metaChips.length > 0) {
            tagCount = Math.max(0, metaChips.length - 1); // Exclude language chip
          } else if (tagSpans.length > 0) {
            tagCount = tagSpans.length;
          }

          if (tagCount === 0) tagStats.noTags++;
          else if (tagCount <= 5) tagStats.fewTags++;
          else if (tagCount <= 9) tagStats.mediumTags++;
          else tagStats.manyTags++;

          console.log(`🏷️ Card ${index + 1}: ${tagCount} tags`);
        });

        console.log("📊 TAG DISTRIBUTION:", tagStats);
        return tagStats;
      }

      // Initialize tag-based height adjustment
      function initializeTagHeightAdjustment() {
        console.log("🚀 Initializing tag-based height adjustment system");

        // Wait for DOM to be fully loaded
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
              logTagAnalysis();
              adjustCardHeightsForTags();
            }, 500);
          });
        } else {
          setTimeout(() => {
            logTagAnalysis();
            adjustCardHeightsForTags();
          }, 500);
        }

        // Re-adjust when new content is loaded
        const observer = new MutationObserver((mutations) => {
          let shouldReadjust = false;

          mutations.forEach((mutation) => {
            if (mutation.type === "childList") {
              const addedNodes = Array.from(mutation.addedNodes);
              if (
                addedNodes.some(
                  (node) =>
                    node.nodeType === 1 &&
                    (node.classList?.contains("snippet-card") ||
                      node.querySelector?.(".snippet-card"))
                )
              ) {
                shouldReadjust = true;
              }
            }
          });

          if (shouldReadjust) {
            console.log("🔄 New snippet cards detected, re-adjusting heights");
            setTimeout(adjustCardHeightsForTags, 100);
          }
        });

        observer.observe(document.body, {
          childList: true,
          subtree: true,
        });

        console.log("✅ Tag height adjustment system initialized");
      }

      // Manual adjustment function for testing
      window.adjustCardHeights = adjustCardHeightsForTags;
      window.analyzeTagDistribution = logTagAnalysis;

      // Auto-initialize
      initializeTagHeightAdjustment();

      // Enhanced Card Height Logging
      function logCardHeights() {
        console.log("🔍 CARD HEIGHT DEBUG - Checking snippet card dimensions");

        const cards = document.querySelectorAll(".snippet-card");
        const codeBlocks = document.querySelectorAll(
          ".snippet-code, .code-preview"
        );

        console.log(
          `📊 Found ${cards.length} snippet cards and ${codeBlocks.length} code blocks`
        );

        cards.forEach((card, index) => {
          const rect = card.getBoundingClientRect();
          const codeBlock = card.querySelector(".snippet-code, .code-preview");
          const codeRect = codeBlock ? codeBlock.getBoundingClientRect() : null;

          console.log(`📏 Card ${index + 1}:`, {
            height: rect.height,
            codeHeight: codeRect ? codeRect.height : "N/A",
            hasScrollY: codeBlock
              ? codeBlock.scrollHeight > codeBlock.clientHeight
              : false,
            hasScrollX: codeBlock
              ? codeBlock.scrollWidth > codeBlock.clientWidth
              : false,
          });
        });
      }

      // Call after DOM loads
      document.addEventListener("DOMContentLoaded", function () {
        setTimeout(logCardHeights, 1000);
      });
      // Stop dashboard.js from interfering
      if (window.dashboardManager) {
        window.dashboardManager = null;
      }

      // Prevent dashboard.js from initializing
      window.dashboardManagerDisabled = true;
      // Initialize syntax highlighting
      hljs.highlightAll();

      // DOM Elements
      const snippetsGrid = document.getElementById("snippetsGrid");
      const snippetCount = document.getElementById("snippetCount");
      const searchInput = document.getElementById("searchInput");
      const filterChips = document.querySelectorAll(".filter-chip");

      // State
      let allSnippets = [];
      let filteredSnippets = [];
      let currentFilter = "all";
      // 🔥 FIX: Add protection for currentFilter variable
      Object.defineProperty(window, "currentFilter", {
        get: function () {
          return currentFilter;
        },
        set: function (value) {
          // Validate the value before setting
          if (
            value === undefined ||
            value === "undefined" ||
            value === null ||
            value === ""
          ) {
            console.warn(
              `⚠️ FILTER_PROTECTION: Attempted to set invalid currentFilter value: ${value}, keeping current: ${currentFilter}`
            );
            return; // Don't change the value

          `🔍 Current Filter BEFORE validation: "${currentFilter}" (type: ${typeof currentFilter})`

        if (
          currentFilter === undefined ||
          currentFilter === "undefined" ||
          currentFilter === null

            `⚠️ FILTER_SNIPPETS: currentFilter is invalid (${currentFilter}), resetting to "all"`
          );

        }

        console.log(`🔍 Current Filter AFTER validation: "${currentFilter}"`);
        console.log(`🔍 Total snippets available: ${allSnippets.length}`);

        // Log all snippets with favorite status

            `  ${index + 1}. ${snippet.id}: "${snippet.title}" (favorite: ${
              snippet.is_favorite
            })`
          );
        });

        filteredSnippets = allSnippets.filter((snippet) => {
          const matchesSearch =
            !searchQuery ||
            (snippet.title &&
              snippet.title.toLowerCase().includes(searchQuery)) ||
            (snippet.code &&
              snippet.code.toLowerCase().includes(searchQuery)) ||
            (snippet.language &&
              snippet.language.toLowerCase().includes(searchQuery)) ||
            (snippet.description &&
              snippet.description.toLowerCase().includes(searchQuery));

          let matchesFilter = false;

          if (currentFilter === "all") {
            matchesFilter = true;
          } else if (currentFilter === "favorites") {
            matchesFilter = snippet.is_favorite === true;
            console.log(
              `⭐ Favorites check for ${snippet.id}: is_favorite=${snippet.is_favorite}, matches=${matchesFilter}`
            );
          } else if (currentFilter === "recent") {
            matchesFilter = isRecent(snippet.created_at);
          } else if (snippet.language) {
            matchesFilter = snippet.language.toLowerCase() === currentFilter;
          }

          const finalMatch = matchesSearch && matchesFilter;

          if (currentFilter === "favorites") {
            console.log(
              `⭐ Final result for ${snippet.id}: search=${matchesSearch}, filter=${matchesFilter}, final=${finalMatch}`
            );
          }

          return finalMatch;
        });

        console.log(`🔍 Filtered results: ${filteredSnippets.length} snippets`);

        if (currentFilter === "favorites") {
          console.log(`⭐ FAVORITES FILTER RESULTS:`);

      function isRecent(dateString) {
        const date = new Date(dateString);
        const now = new Date();
        const diffTime = Math.abs(now - date);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        return diffDays <= 7;
      }

      function updateAdvancedLineNumbers() {
        const codeEditor = document.getElementById("advancedCodeEditor");
        const lineNumbers = document.getElementById("advancedLineNumbers");

      function updateAdvancedEditorStats() {
        const codeEditor = document.getElementById("advancedCodeEditor");

        charCount.textContent = `${text.length} characters`;
      }

      function updateCursorPosition() {
        const codeEditor = document.getElementById("advancedCodeEditor");
        const cursorPos = document.getElementById("editorCursorPos");

        const text = codeEditor.value;
        const cursorPosition = codeEditor.selectionStart;

        const textBeforeCursor = text.substring(0, cursorPosition);
        const lines = textBeforeCursor.split("\n");
        const line = lines.length;
        const column = lines[lines.length - 1].length + 1;

        cursorPos.textContent = `Line ${line}, Column ${column}`;
      }

      function formatAdvancedCode() {
        const codeEditor = document.getElementById("advancedCodeEditor");
        const languageSelect = document.getElementById("editorLanguageSelect");

        let code = codeEditor.value;
        const language = languageSelect.value;

        // Simple formatting based on language
        if (
          language === "javascript" ||
          language === "css" ||
          language === "json"
        ) {
          // Basic indentation for JS/CSS
          const lines = code.split("\n");
          let indentLevel = 0;
          const formatted = lines
            .map((line) => {
              const trimmed = line.trim();

              if (trimmed.includes("}") && !trimmed.includes("{")) {
                indentLevel = Math.max(0, indentLevel - 1);
              }

              const indented = "  ".repeat(indentLevel) + trimmed;

              if (trimmed.includes("{") && !trimmed.includes("}")) {
                indentLevel++;
              }

              return indented;
            })
            .join("\n");

          codeEditor.value = formatted;
        }

        updateAdvancedLineNumbers();
        updateAdvancedEditorStats();

      async function saveAdvancedSnippet(closeAfter = false) {
        console.log("🚀 ===== ENHANCED ADVANCED SAVE START =====");

        const titleInput = document.getElementById("editorSnippetTitle");
        const codeEditor = document.getElementById("advancedCodeEditor");
        const languageSelect = document.getElementById("editorLanguageSelect");
        const collectionSelect = document.getElementById(
          "advancedSnippetCollection"
        );

        const snippetData = {
          title: titleInput.value.trim() || "Untitled Snippet",
          code: codeEditor.value.trim(),
          language: languageSelect.value,
          description: "",
          tags: "",
        };

        // Get selected collection
        const selectedCollectionId = collectionSelect
          ? collectionSelect.value
          : null;
        console.log("🚀 Advanced editor data:", snippetData);
        console.log("🚀 Selected collection ID:", selectedCollectionId);

        if (!snippetData.code) {
          showToast("Please enter some code", "error");
          return;
        }

        try {
          const url = currentAdvancedSnippet
            ? `/api/snippets/${currentAdvancedSnippet.id}`
            : "/api/snippets/";
          const method = currentAdvancedSnippet ? "PUT" : "POST";

          // Add collection_id for new snippets
          if (!currentAdvancedSnippet && selectedCollectionId) {
            snippetData.collection_id = selectedCollectionId;
          }

          const response = await fetch(url, {
            method: method,
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(snippetData),
          });

          const result = await response.json();
          console.log("🚀 Advanced save result:", result);

          if (result.success) {
            const collectionName = selectedCollectionId
              ? allCollections.find((c) => c.id === selectedCollectionId)
                  ?.name || "Unknown"
              : null;

            const message = currentAdvancedSnippet
              ? "Snippet updated! 💾"
              : collectionName
              ? `Snippet created and added to "${collectionName}" 💾`
              : "Snippet created! 💾";

            showToast(message, "success");

            if (closeAfter) {
              closeAdvancedEditor();
            }

            loadSnippets();
          } else {
            showToast(result.message || "Failed to save snippet", "error");
          }
        } catch (error) {
          console.error("❌ Error saving advanced snippet:", error);
          showToast("Failed to save snippet", "error");
        }

        console.log("🚀 ===== ENHANCED ADVANCED SAVE END =====");
      }

      // Open snippet modal

        );

        if (!snippetModal) {

            "❌ Snippets: snippetModal not available in openSnippetModal"
          );
          showToast("Modal not available. Please refresh the page.", "error");
          return;
        }

        editingSnippetId = snippet ? snippet.id : null;

        if (snippet) {
          console.log("🚀 Snippets: Setting up modal for editing");
          const modalTitle = document.getElementById("modalTitle");
          const snippetTitle = document.getElementById("snippetTitle");
          const snippetLanguage = document.getElementById("snippetLanguage");
          const snippetTags = document.getElementById("snippetTags");
          const snippetCode = document.getElementById("snippetCode");
          const snippetDescription =
            document.getElementById("snippetDescription");

          if (modalTitle) modalTitle.textContent = "Edit Snippet";
          if (snippetTitle) snippetTitle.value = snippet.title || "";
          if (snippetLanguage) snippetLanguage.value = snippet.language || "";
          if (snippetTags)
            snippetTags.value = Array.isArray(snippet.tags)
              ? snippet.tags.join(", ")
              : snippet.tags || "";
          if (snippetCode) snippetCode.value = snippet.code || "";
          if (snippetDescription)
            snippetDescription.value = snippet.description || "";
        } else {
          console.log("🚀 Snippets: Setting up modal for new snippet");
          const modalTitle = document.getElementById("modalTitle");
          if (modalTitle) modalTitle.textContent = "Add New Snippet";
          if (snippetForm) {
            snippetForm.reset();
          }

        snippetModal.classList.add("active");
        console.log("✅ Snippets: Modal opened successfully");

        // Focus on title input
        setTimeout(() => {
          const titleInput = document.getElementById("snippetTitle");
          if (titleInput) {
            titleInput.focus();

      // Enhanced snippet form submission with BOTH collections AND team sharing

          title: document.getElementById("snippetTitle").value.trim(),

            .getElementById("snippetDescription")

        const collectionSelect = document.getElementById("snippetCollection");
        const selectedCollectionId = collectionSelect
          ? collectionSelect.value
          : null;

        const selectedTeams = Array.from(
          document.querySelectorAll('input[name="shareTeams"]:checked')
        ).map((cb) => cb.value);

        console.log("🚀 Form data:", formData);
        console.log("🚀 Selected collection ID:", selectedCollectionId);
        console.log("🚀 Selected teams:", selectedTeams);

        if (!formData.title || !formData.code || !formData.language) {
          showToast("Please fill in all required fields", "error");
          return;
        }

        try {
          // ✅ STEP 1: CREATE SNIPPET WITH COLLECTION (if selected)
          if (selectedCollectionId) {
            formData.collection_id = selectedCollectionId;
          }

          const createResponse = await fetch("/api/snippets/", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(formData),
          });

          const createResult = await createResponse.json();
          console.log("🚀 Create snippet result:", createResult);

          if (!createResult.success) {
            showToast(
              createResult.message || "Failed to create snippet",
              "error"
            );
            return;
          }

          const snippetId = createResult.snippet.id;
          let successMessage = "Snippet created successfully! ✅";

          // ✅ STEP 2: ADD TO COLLECTION (if selected and not already added)
          if (selectedCollectionId && !formData.collection_id) {
            try {
              const collectionResponse = await fetch(
                `/api/snippets/${snippetId}/collections`,
                {
                  method: "POST",
                  headers: {
                    "Content-Type": "application/json",
                  },
                  body: JSON.stringify({
                    collection_id: selectedCollectionId,
                  }),
                }
              );

              const collectionResult = await collectionResponse.json();
              if (collectionResult.success) {
                const collectionName =
                  allCollections.find((c) => c.id === selectedCollectionId)
                    ?.name || "Unknown";
                successMessage = `Snippet created and added to "${collectionName}" ✅`;
              }
            } catch (collectionError) {
              console.error("❌ Error adding to collection:", collectionError);
            }
          }

          // ✅ STEP 3: SHARE WITH TEAMS (if selected)
          // ✅ STEP 3: SHARE WITH TEAMS (if selected)
if (selectedTeams.length > 0) {
  console.log("🔗 Sharing snippet with teams during creation...");

  try {
    const shareResponse = await fetch(
      `/api/snippets/${snippetId}/share`,
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          team_ids: selectedTeams,
          sharing_type: "copy",
        }),
      }
    );

    const shareResult = await shareResponse.json();
    
    // ✅ HANDLE 409 CONFLICT (ALREADY SHARED)
    if (shareResponse.status === 409 && shareResult.error_type === "already_shared") {
      console.log("ℹ️ CREATION SHARING: Already shared, no error");
      const collectionPart = selectedCollectionId
        ? "added to collection, snippet already shared with team(s)"
        : "snippet already shared with selected team(s)";
      successMessage = `✅ Snippet created and ${collectionPart}`;
    }
    // ✅ HANDLE SUCCESS
    else if (shareResult.success) {
      const collectionPart = selectedCollectionId
        ? `added to collection and shared with ${shareResult.shared_count} team(s)`
        : `shared with ${shareResult.shared_count} team(s)`;
      successMessage = `✅ Snippet created and ${collectionPart}!`;
    }
    // ✅ HANDLE OTHER ERRORS
    else {
      successMessage += " (Team sharing failed)";
    }
  } catch (shareError) {
    console.error("❌ Error sharing with teams:", shareError);
    successMessage += " (Team sharing failed)";
  }
}
          // ✅ SHOW SUCCESS MESSAGE
          showToast(successMessage, "success");
          closeSnippetModal();
          loadSnippets(); // Reload snippets to show the new one

          console.log("✅ Snippet creation completed successfully");
        } catch (error) {
          console.error("❌ Error in enhanced snippet submit:", error);
          showToast("Failed to save snippet. Please try again.", "error");
        }

        console.log("🚀 ===== ENHANCED SNIPPET SUBMIT END =====");
