<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/zustand@4.4.1/vanilla.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <title>Code Snippet Manager</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        /* Clean Cyberpunk Palette */
        --cyber-bg: #0a0a0f;
        --cyber-surface: #1a1a2e;
        --cyber-border: #2d2d44;
        --cyber-primary: #00ffff;
        --cyber-secondary: #ff0080;
        --cyber-accent: #39ff14;
        --cyber-text: #ffffff;
        --cyber-text-muted: #ffffff;
        --cyber-hover: rgba(0, 255, 255, 0.1);
      }

      body {
        width: 500px;
        min-height: 700px;
        font-family: "JetBrains Mono", "Fira Code", monospace;
        background: var(--cyber-bg);
        color: var(--cyber-text);
        overflow: hidden;
        position: relative;
        border: 1px solid var(--cyber-border);
      }

      .container {
        position: relative;
        z-index: 1;
        padding: 20px;
        background: var(--cyber-bg);
      }

      header {
        text-align: center;
        margin-bottom: 24px;
        padding: 16px;
        background: var(--cyber-surface);
        border: 1px solid var(--cyber-border);
        border-radius: 4px;
      }

      h1 {
        font-size: 20px;
        font-weight: 600;
        color: var(--cyber-primary);
        margin-bottom: 8px;
        letter-spacing: 0.5px;
      }

      .subtitle {
        font-size: 11px;
        font-weight: bolder;
        color: var(--cyber-text-muted);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 12px;
      }

      .status-indicator {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 6px 12px;
        background: var(--cyber-surface);
        border: 1px solid var(--cyber-border);
        border-radius: 4px;
        font-size: 11px;
      }

      .status-icon {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--cyber-text-muted);
      }

      .status-icon.connected {
        background: var(--cyber-accent);
      }

      .status-icon.connecting {
        background: var(--cyber-secondary);
      }

      .status-icon.disconnected {
        background: var(--cyber-text-muted);
      }

      .tab-nav {
        display: flex;
        margin-bottom: 20px;
        background: var(--cyber-surface);
        border: 1px solid var(--cyber-border);
        border-radius: 4px;
        overflow: hidden;
      }

      .tab-btn {
        flex: 1;
        padding: 10px 8px;
        background: transparent;
        border: none;
        color: var(--cyber-text-muted);
        font-size: 12 px;
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
        transition: all 0.2s ease;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        border-right: 1px solid var(--cyber-border);
      }

      .tab-btn:last-child {
        border-right: none;
      }

      .tab-btn.active {
        background: var(--cyber-primary);
        color: var(--cyber-bg);
      }

      .tab-btn:hover:not(.active) {
        background: var(--cyber-hover);
        color: var(--cyber-text);
      }

      .tab-content {
        display: none;
      }

      .tab-content.active {
        display: block;
      }

      .section {
        margin-bottom: 16px;
        background: var(--cyber-surface);
        border: 1px solid var(--cyber-border);
        border-radius: 4px;
        padding: 16px;
      }

      .section h2 {
        font-size: 12px;
        margin-bottom: 12px;
        color: var(--cyber-primary);
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 6px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .section-icon {
        font-size: 10px;
      }

      .input-group {
        margin-bottom: 12px;
      }

      label {
        display: block;
        margin-bottom: 4px;
        font-size: 10px;
        color: var(--cyber-text-muted);
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      input[type="text"],
      input[type="password"],
      input[type="email"] {
        width: 100%;
        padding: 8px 10px;
        background: var(--cyber-bg);
        border: 1px solid var(--cyber-border);
        border-radius: 4px;
        color: var(--cyber-text);
        font-size: 12px;
        font-family: inherit;
        transition: border-color 0.2s ease;
      }

      input:focus {
        outline: none;
        border-color: var(--cyber-primary);
      }

      input::placeholder {
        color: var(--cyber-text-muted);
      }

      .actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }

      .btn {
        flex: 1;
        padding: 8px 12px;
        border: 1px solid var(--cyber-border);
        border-radius: 4px;
        font-size: 10px;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        transition: all 0.2s ease;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .btn.primary {
        background: var(--cyber-primary);
        color: var(--cyber-bg);
        border-color: var(--cyber-primary);
      }

      .btn.primary:hover {
        background: transparent;
        color: var(--cyber-primary);
      }

      .btn.secondary {
        background: transparent;
        color: var(--cyber-text);
        border-color: var(--cyber-border);
      }

      .btn.secondary:hover {
        background: var(--cyber-hover);
        border-color: var(--cyber-primary);
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .quick-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 16px;
      }

      .quick-btn {
        padding: 12px 8px;
        background: var(--cyber-bg);
        border: 1px solid var(--cyber-border);
        border-radius: 4px;
        color: var(--cyber-text);
        text-decoration: none;
        font-size: 10px;
        font-weight: 500;
        font-family: inherit;
        text-align: center;
        transition: all 0.2s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .quick-btn:hover {
        background: var(--cyber-hover);
        border-color: var(--cyber-primary);
      }

      .quick-btn-icon {
        font-size: 14px;
        color: var(--cyber-primary);
      }

      .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 12px;
      }

      .stat-item {
        text-align: center;
        padding: 12px;
        background: var(--cyber-bg);
        border: 1px solid var(--cyber-border);
        border-radius: 4px;
      }

      .stat-number {
        font-size: 18px;
        font-weight: 600;
        color: var(--cyber-primary);
        margin-bottom: 4px;
        font-family: inherit;
      }

      .stat-label {
        font-size: 9px;
        color: var(--cyber-text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .recent-snippets,
      #collections-list {
        max-height: 120px;
        overflow-y: auto;
        margin-bottom: 12px;
      }

      .snippet-item,
      .collection-item {
        padding: 8px;
        background: var(--cyber-bg);
        border: 1px solid var(--cyber-border);
        border-radius: 4px;
        margin-bottom: 6px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .snippet-item:hover,
      .collection-item:hover {
        background: var(--cyber-hover);
        border-color: var(--cyber-primary);
      }

      .snippet-title,
      .collection-title {
        font-size: 11px;
        font-weight: 500;
        color: var(--cyber-text);
        margin-bottom: 2px;
      }

      .snippet-meta,
      .collection-meta {
        font-size: 9px;
        color: var(--cyber-text-muted);
      }

      .collection-count {
        background: var(--cyber-primary);
        color: var(--cyber-bg);
        padding: 2px 6px;
        border-radius: 2px;
        font-size: 8px;
        font-weight: 600;
      }

      .search-box {
        position: relative;
        margin-bottom: 12px;
      }

      .search-box input {
        padding-left: 28px;
      }

      .search-icon {
        position: absolute;
        left: 8px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--cyber-text-muted);
        font-size: 12px;
      }

      .footer {
        border-top: 1px solid var(--cyber-border);
        padding-top: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 9px;
        color: var(--cyber-text-muted);
      }

      .version {
        background: var(--cyber-primary);
        color: var(--cyber-bg);
        padding: 2px 6px;
        border-radius: 2px;
        font-weight: 600;
      }

      .links {
        display: flex;
        gap: 12px;
      }

      .links a {
        color: var(--cyber-text-muted);
        text-decoration: none;
        transition: color 0.2s ease;
      }

      .links a:hover {
        color: var(--cyber-primary);
      }

      .toggle-switch {
        position: relative;
        width: 36px;
        height: 18px;
        background: var(--cyber-bg);
        border: 1px solid var(--cyber-border);
        border-radius: 9px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .toggle-switch.active {
        background: var(--cyber-primary);
        border-color: var(--cyber-primary);
      }

      .toggle-slider {
        position: absolute;
        top: 1px;
        left: 1px;
        width: 14px;
        height: 14px;
        background: var(--cyber-text);
        border-radius: 50%;
        transition: all 0.2s ease;
      }

      .toggle-switch.active .toggle-slider {
        transform: translateX(16px);
        background: var(--cyber-bg);
      }

      .notification {
        position: fixed;
        top: 16px;
        right: 16px;
        padding: 8px 12px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: 500;
        font-family: inherit;
        z-index: 1000;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .notification.success {
        background: var(--cyber-accent);
        color: var(--cyber-bg);
      }

      .notification.error {
        background: var(--cyber-secondary);
        color: var(--cyber-text);
      }

      .notification.warning {
        background: #ffaa00;
        color: var(--cyber-bg);
      }

      .hidden {
        display: none;
      }

      /* Clean scrollbar */
      ::-webkit-scrollbar {
        width: 4px;
      }

      ::-webkit-scrollbar-track {
        background: var(--cyber-bg);
      }

      ::-webkit-scrollbar-thumb {
        background: var(--cyber-border);
        border-radius: 2px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: var(--cyber-primary);
      }
    </style>
  </head>
  <body>
    <!-- Animated Background Particles -->
    <div class="bg-particles"></div>

    <div class="container">
      <header>
        <h1>Code Snippet Manager</h1>
        <p class="subtitle">Capture • Organize • Access</p>
        <div class="status-indicator">
          <span id="status-icon" class="status-icon disconnected"></span>
          <span id="status-text">Disconnected</span>
        </div>
      </header>

      <!-- Tab Navigation -->
      <!-- Tab Navigation -->
      <div class="tab-nav">
        <button class="tab-btn active" data-tab="connection">Connection</button>
        <button class="tab-btn" data-tab="snippets">Snippets</button>
        <button class="tab-btn" data-tab="collections">Collections</button>
        <button class="tab-btn" data-tab="auth">Account</button>
      </div>

      <!-- Connection Tab -->
      <div id="connection-tab" class="tab-content active">
        <div class="section">
          <h2>
            <span class="section-icon">🔗</span>
            Server Connection
          </h2>
          <div class="input-group">
            <label for="server-url">Server URL:</label>
            <input
              type="text"
              id="server-url"
              placeholder="http://localhost:5000" />
          </div>
          <div class="actions">
            <button id="connect-btn" class="btn primary">Connect</button>
            <button id="disconnect-btn" class="btn secondary" disabled>
              Disconnect
            </button>
            <button class="btn primary" id="test-btn">
              Test Auth Endpoint
            </button>
          </div>
        </div>

        <!-- Stats Section -->
        <div class="section">
          <h2>
            <span class="section-icon">📊</span>
            Statistics
          </h2>
          <div class="stats-grid">
            <div class="stat-item">
              <div class="stat-number" id="total-snippets">0</div>
              <div class="stat-label">Total Snippets</div>
            </div>
            <div class="stat-item">
              <div class="stat-number" id="collections-count">0</div>
              <div class="stat-label">Collections</div>
            </div>
          </div>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions">
          <div class="quick-btn" id="sync-now-btn">
            <div class="quick-btn-icon">⚡</div>
            Sync Now
          </div>
          <div class="quick-btn" id="open-dashboard">
            <div class="quick-btn-icon">🚀</div>
            Dashboard
          </div>
          <div class="quick-btn" id="clear-changes-btn">
            <div class="quick-btn-icon">🗑️</div>
            Clear Cache
          </div>
          <div class="quick-btn" id="view-docs">
            <div class="quick-btn-icon">📚</div>
            Docs
          </div>
        </div>
      </div>

      <!-- Snippets Tab -->
      <div id="snippets-tab" class="tab-content">
        <div class="section">
          <h2>
            <span class="section-icon">📝</span>
            Recent Snippets
          </h2>
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input
              type="text"
              id="search-snippets"
              placeholder="Search snippets..." />
          </div>
          <div class="recent-snippets" id="recent-snippets-list">
            <!-- Snippets will be loaded here -->
          </div>
          <div class="actions">
            <button id="capture-snippet-btn" class="btn primary">
              Capture Code
            </button>
            <button id="view-all-snippets" class="btn secondary">
              View All
            </button>
          </div>
        </div>
      </div>

      <!-- Collections Tab -->
      <div id="collections-tab" class="tab-content">
        <div class="section">
          <h2>
            <span class="section-icon">📁</span>
            My Collections
          </h2>
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input
              type="text"
              id="search-collections"
              placeholder="Search collections..." />
          </div>
          <div class="recent-snippets" id="collections-list">
            <!-- Collections will be loaded here -->
          </div>
          <div class="actions">
            <button id="create-collection-btn" class="btn primary">
              New Collection
            </button>
            <button id="manage-collections" class="btn secondary">
              Manage All
            </button>
          </div>
        </div>
      </div>

      <!-- Account Tab -->
      <div id="auth-tab" class="tab-content">
        <div class="section" id="login-section">
          <h2>
            <span class="section-icon">👤</span>
            Login
          </h2>
          <div class="input-group">
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="your@email.com" />
          </div>
          <div class="input-group">
            <label for="password">Password:</label>
            <input type="password" id="password" placeholder="••••••••" />
          </div>
          <div class="actions">
            <button id="login-btn" class="btn primary">Login</button>
            <button id="register-btn" class="btn secondary">Register</button>
          </div>
        </div>

        <div class="section hidden" id="user-section">
          <h2>
            <span class="section-icon">👋</span>
            Welcome Back
          </h2>
          <div class="input-group">
            <label>Auto-sync snippets:</label>
            <div class="toggle-switch" id="auto-sync-toggle">
              <div class="toggle-slider"></div>
            </div>
          </div>
          <div class="actions">
            <button id="logout-btn" class="btn secondary">Logout</button>
            <button id="settings-btn" class="btn primary">Settings</button>
          </div>
        </div>
      </div>

      <footer class="footer">
        <div class="version">v1.0.0</div>
        <div class="links">
          <a href="#" id="about-link">About</a>
          <a href="#" id="support-link">Support</a>
        </div>
      </footer>
    </div>
    <script src="popup.js"></script>
    <script>
      // Clean Cyberpunk Theme Logger
      console.log("🔧 CLEAN CYBERPUNK - Initializing minimal theme");

      // Clean theme initialization
      function initializeCleanTheme() {
        console.log("🎯 CLEAN CYBERPUNK - Starting clean initialization");

        try {
          // Add JetBrains Mono font
          const link = document.createElement("link");
          link.href =
            "https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap";
          link.rel = "stylesheet";
          document.head.appendChild(link);
          console.log("🔤 CLEAN CYBERPUNK - JetBrains Mono font loaded");

          // Theme status
          console.log("✅ CLEAN CYBERPUNK - Minimal theme active");
          console.log("🎨 CLEAN CYBERPUNK - No glow effects");
          console.log("⚡ CLEAN CYBERPUNK - Clean animations");
          console.log("🔧 CLEAN CYBERPUNK - Modern typography");
        } catch (error) {
          console.error("❌ CLEAN CYBERPUNK - Initialization error:", error);
        }
      }

      // Initialize when DOM is ready
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initializeCleanTheme);
      } else {
        initializeCleanTheme();
      }

      console.log(
        "🚀 CLEAN CYBERPUNK - Minimal cyberpunk experience activated!"
      );
    </script>
  </body>
</html>
